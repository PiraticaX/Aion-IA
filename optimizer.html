<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Construction Intelligence Engine</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
:root {
    --bg: #0b0f19;
    --panel: #111827;
    --border: rgba(255,255,255,0.06);
    --text: #f3f4f6;
    --muted: #9ca3af;
    --accent: #3b82f6;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* TOP BAR */
.topbar {
    height: 70px;
    background: rgba(11,15,25,0.85);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
}

.brand {
    font-weight: 600;
    font-size: 16px;
    letter-spacing: 0.5px;
}

.subtle {
    color: var(--muted);
    font-size: 13px;
}

.back {
    text-decoration: none;
    color: var(--muted);
    font-size: 13px;
    transition: 0.2s;
}

.back:hover {
    color: var(--accent);
}

/* APP CONTAINER */
.app-wrapper {
    height: calc(100vh - 70px);
    width: 100%;
    position: relative;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* Loader */
.loader {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    color: var(--muted);
    font-size: 14px;
    letter-spacing: 1px;
}
</style>
</head>

<body>

<div class="topbar">
    <div>
        <div class="brand">Quantum Construction Intelligence</div>
        <div class="subtle">Decision Intelligence Engine</div>
    </div>
    <a href="/" class="back">Back</a>
</div>

<div class="app-wrapper">
    <div class="loader" id="loader">Launching Optimization Engine...</div>
    <iframe 
        src="https://construction-optimizer.onrender.com/?embedded=true"
        onload="document.getElementById('loader').style.display='none';"
        allowfullscreen>
    </iframe>
</div>

</body>
</html>
